<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Auto Inference — Open Graph card 1200x630 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E0B0A"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.6">
      <stop offset="0" stop-color="rgba(217,119,6,0.20)"/>
      <stop offset="0.5" stop-color="rgba(194,65,12,0.06)"/>
      <stop offset="1" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FB923C"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- subtle grid lines (suggest the ASCII rain) -->
  <g opacity="0.08" stroke="#FFE6D2" stroke-width="1">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="470" x2="1200" y2="470"/>
  </g>

  <!-- brand line: small kicker -->
  <text x="80" y="120" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace"
        font-size="22" font-weight="600" fill="#D97706" letter-spacing="2">
    // autoinference.org
  </text>

  <!-- wordmark -->
  <text x="80" y="245" font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="110" font-weight="800" fill="url(#brand)" letter-spacing="-2">
    Auto Inference
  </text>

  <!-- main tagline -->
  <text x="80" y="345" font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="48" font-weight="700" fill="#FAFAFA" letter-spacing="-1">
    Peak inference performance.
  </text>
  <text x="80" y="405" font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="48" font-weight="700" fill="#9CA3AF" letter-spacing="-1">
    Zero ML engineering.
  </text>

  <!-- value bullets -->
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="22" fill="#9CA3AF">
    <text x="80" y="500">
      <tspan fill="#D97706" font-weight="700">›</tspan>
      <tspan dx="10">Drop in any model, any hardware</tspan>
    </text>
    <text x="80" y="540">
      <tspan fill="#D97706" font-weight="700">›</tspan>
      <tspan dx="10">Agentic engine selection · kernel synthesis · validation</tspan>
    </text>
    <text x="80" y="580">
      <tspan fill="#D97706" font-weight="700">›</tspan>
      <tspan dx="10">$ npx skill add @autoinference/skill</tspan>
    </text>
  </g>

  <!-- top-right alpha badge -->
  <g transform="translate(1020, 80)">
    <rect x="0" y="0" width="100" height="32" rx="6" fill="rgba(217,119,6,0.10)" stroke="rgba(217,119,6,0.40)" stroke-width="1"/>
    <text x="50" y="21" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace"
          font-size="13" font-weight="600" fill="#D97706" text-anchor="middle">v0.0.1-alpha</text>
  </g>
</svg>
